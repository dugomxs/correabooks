<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="shortcut icon" href="assets/img/logo_verde.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css?v=1.5">
    <title>Pagamento Confirmado | Corrêa Books</title>
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fdfbf7;
            padding: 2rem;
            text-align: center;
        }
        .success-card {
            background: white;
            padding: 4rem 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            animation: cardAppear 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
        }
        .success-card h1 {
            font-family: Fraunces, serif;
            font-size: 2.5rem;
            color: #222;
            margin-bottom: 1rem;
        }
        .success-card p {
            font-family: Montserrat, sans-serif;
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .payment-id-box {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1rem;
            color: #5c7a9c;
            margin-bottom: 2.5rem;
            border: 1px dashed #ddd;
        }
        .whatsapp-success-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background-color: #25d366;
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-family: Montserrat, sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .whatsapp-success-btn:hover {
            background-color: #128c7e;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
        .back-home {
            display: block;
            margin-top: 2rem;
            color: #888;
            text-decoration: none;
            font-family: Montserrat, sans-serif;
            font-size: 0.9rem;
        }
        .back-home:hover {
            color: #222;
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h1>Excelente escolha!</h1>
            <p>Seu pagamento foi processado com sucesso. O Encontro agora faz parte da sua jornada.</p>
            
            <div id="payment-info" style="display: none;">
                <span style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #999;">ID da Transação</span>
                <div class="payment-id-box" id="payment-id">---</div>
            </div>

            <p>Para agilizarmos a entrega, clique no botão abaixo e nos envie uma mensagem no WhatsApp:</p>

            <a href="#" id="whatsapp-link" class="whatsapp-success-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Informar no WhatsApp
            </a>

            <a href="index.html" class="back-home">Voltar para a página inicial</a>
        </div>
    </div>

    <script>
        // Lógica para capturar o ID do pagamento da URL
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id');
        const status = urlParams.get('status');

        if (paymentId) {
            document.getElementById('payment-info').style.display = 'block';
            document.getElementById('payment-id').textContent = paymentId;
        }

        // Configurar link do WhatsApp
        const whatsappNumber = "5512991481871"; // Seu número (baseado no footer)
        let message = "Olá! Acabei de garantir meu exemplar do livro O Encontro.";
        if (paymentId) {
            message += ` O ID do meu pagamento é: ${paymentId}.`;
        }
        
        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
        document.getElementById('whatsapp-link').href = whatsappUrl;
    </script>
</body>
</html>
